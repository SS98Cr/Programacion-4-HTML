<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
</head>
<body>

    <h1>Registro en nuestra tienda</h1>

    <form>

        <label>Nombre de usuario</label><br>
        <input type="text" placeholder="Ej: luis"><br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Ej: luis@gmail.com"><br><br>

        <label>Edad:</label><br>
        <input type="number" placeholder="Ej: 21"><br><br>

        <label>Género:</label><br>
        <input type="radio" name="genero"> Masculino<br>
        <input type="radio" name="genero"> Femenino<br><br>

        <label>Recomendado por:</label><br>
        <select>
            <option>Google</option>
            <option>Facebook</option>
            <option>Instagram</option>
            <option>Un amigo</option>
        </select><br><br>

        <label>Comentarios:</label><br>
        <textarea rows="4" cols="30"></textarea><br><br>

        <label>Acepto términos y condiciones:</label><br>
        <input type="checkbox"><br><br>

        <input type="submit" value="Registrar">

    </form>

</body>
</html>
